services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend
    working_dir: /app
    # Reinstall on startup so the bind-mounted host package.json wins over the
    # image's frozen node_modules. CI=true makes pnpm skip the interactive
    # "remove modules?" prompt.
    command: sh -c "pnpm install && pnpm run dev -- --host 0.0.0.0 --port 80"
    ports:
      - "1313:80"
    volumes:
      # Absolute host path — the docker daemon evaluates volumes on the host.
      # /coding/Synclet inside pocket-dev → /mnt/user/misc/coding/Synclet on Tower.
      # Relative ./frontend would expand to /coding/Synclet/frontend, which does
      # not exist on the host and would silently mount a tmpfs.
      - /mnt/user/misc/coding/Synclet/frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CI=true
      # Same compose network — service-name DNS works.
      - VITE_BACKEND_URL=http://backend:1314
    mem_limit: 1g
    memswap_limit: 1g
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend
    working_dir: /app
    command: uv run uvicorn main:app --host 0.0.0.0 --port 1314 --reload
    ports:
      - "1314:1314"
    volumes:
      # Project code — absolute host paths (see frontend service for reasoning).
      - /mnt/user/misc/coding/Synclet/backend:/app
      - /mnt/user/misc/coding/Synclet/data:/app/data
      # Host paths — evaluated on the Tower host. /mnt/user/data is NOT under
      # /mnt/user/misc; /coding/Synclet → /mnt/user/misc/coding/Synclet, but
      # /data/media → /mnt/user/data/media (no misc/ prefix).
      - /mnt/user/data/media:/data/media:ro
      - /mnt/user/data/others/synced-media:/data/others/synced-media
      - /mnt/user/appdata/watchstate:/appdata/watchstate:ro
    # Shared env contract — see synclet.env for the full set. The optional
    # .env (gitignored) layers on top for secrets (Syncthing API key, a
    # rotated Plex token). DO NOT mirror SYNCLET_* into `environment:`
    # below — duplicated lines silently override synclet.env and the two
    # sources of truth drift.
    env_file:
      - synclet.env
      - path: .env
        required: false
    environment:
      # Dev-only: backend container points uv at the out-of-tree venv so the
      # bind-mounted /app source doesn't mask it. Prod sets this in the
      # Dockerfile's ENV so it doesn't appear here.
      - UV_PROJECT_ENVIRONMENT=/opt/venv
    # host.docker.internal is not auto-resolved on Linux Docker the way it
    # is on Docker Desktop; the extra_hosts entry maps it to the Docker
    # bridge gateway so SYNCTHING_URL=http://host.docker.internal:8384
    # reaches a Syncthing running on the host. Users who prefer an explicit
    # LAN IP can ignore this and set SYNCTHING_URL accordingly.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    memswap_limit: 2g
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .mypy_cache/
            - .ruff_cache/
        - action: rebuild
          path: ./backend/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock
